<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン | Playwrightテスト用モックアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-blue-100"
    data-page="login"
  >
    <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-sm">
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-full mb-4"
        >
          <svg
            class="w-7 h-7 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">システムログイン</h1>
        <p class="text-xs text-gray-400 mt-1">Playwrightテスト用モックアプリ</p>
      </div>

      <div class="space-y-4">
        <!-- id="UserID" — PascalCase（意図的） -->
        <div>
          <label
            for="UserID"
            class="block text-sm font-medium text-gray-600 mb-1"
          >
            ユーザーID
          </label>
          <input
            id="UserID"
            type="text"
            placeholder="ユーザーIDを入力"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
          />
        </div>

        <!-- id="Password" — PascalCase（意図的） -->
        <div>
          <label
            for="Password"
            class="block text-sm font-medium text-gray-600 mb-1"
          >
            パスワード
          </label>
          <input
            id="Password"
            type="password"
            placeholder="パスワードを入力"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
          />
        </div>

        <!-- id="btn-login" — kebab-case -->
        <button
          id="btn-login"
          type="button"
          class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold py-2.5 rounded-lg transition-colors mt-2"
        >
          ログイン
        </button>
      </div>
    </div>

    <script>
      function doLogin() {
        window.location.href = "/menu.html";
      }

      document.getElementById("btn-login").addEventListener("click", doLogin);

      // Enter キーでも遷移
      ["UserID", "Password"].forEach(function (id) {
        document.getElementById(id).addEventListener("keydown", function (e) {
          if (e.key === "Enter") doLogin();
        });
      });
    </script>
  </body>
</html>
